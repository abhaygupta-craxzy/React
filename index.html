<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>
    <h1>Bootstrap Learning</h1>
    <img class="img-fluid"
        src="https://th.bing.com/th/id/OIP.G37tgeQqSNt7v2oPfj9ltQHaE7?w=299&h=199&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
        alt="Image">
    <p class="lead">This is a simple paragraph to demonstrate Bootstrap's lead class.</p>
    <p>This is a regular paragraph.</p>
    <button type="button" class="btn btn-primary">Primary</button>
    <button type="button" class="btn btn-secondary">Secondary</button>
    <button type="button" class="btn btn-danger">Danger</button>
    <button type="button" class="btn btn-info">Info</button>
    <button type="button" class="btn btn-warning">Warning</button>
    <button type="button" class="btn btn-success">Success</button>
    <button type="button" class="btn btn-light">Light</button>
    <button type="button" class="btn btn-dark">Dark</button>

    <br>
    <br>

    <!--  Badges -->
    <button type="button" class="btn btn-primary">Messages <span class="badge bg-secondary">4</span></button>
    <button type="button" class="btn btn-outline-primary">Notification <span
            class="badge bg-danger text-light">5</span></button>

    <!-- Carousel -->

    <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://cdn.pixabay.com/photo/2018/01/14/23/12/nature-3082832__340.jpg"  alt="...">
            </div>
            <div class="carousel-item"> 
                <img src="https://wallpaperaccess.com/full/4723250.jpg"  alt="...">
            </div>
            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/709552/pexels-photo-709552.jpeg?cs=srgb&dl=pexels-samandgos-709552.jpg&fm=jpg"
                    alt="...">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>




</body>

</html>
